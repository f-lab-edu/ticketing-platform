spring:
  application:
    name: ticket-service
  jpa:
    hibernate:
      ddl-auto: create-drop

redis:
  timeout: 3000
  lock:
    wait-time: 5
    lease-time: 3

queue:
  max-processing-count: 100
  entry-timeout-seconds: 300
  waiting-timeout-seconds: 1800
  sse-timeout-milliseconds: 600000
  position-broadcast-interval-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

ticket:
  lock:
    strategy: pessimistic
